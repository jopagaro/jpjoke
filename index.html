<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What's So Funny</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4.5rem);
      color: #ff6b6b;
      text-shadow: 0 0 20px #ff6b6b88;
      margin-bottom: 40px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 20px #ff6b6b88; }
      50% { text-shadow: 0 0 40px #ff6b6bcc, 0 0 80px #ff6b6b44; }
    }

    #joke-section {
      max-width: 600px;
    }

    #setup {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #ffd93d;
    }

    #punchline {
      font-size: 1.3rem;
      color: #6bcb77;
      min-height: 2em;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #punchline.visible {
      opacity: 1;
    }

    button {
      margin-top: 30px;
      padding: 14px 32px;
      font-size: 1.1rem;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px #ff6b6b66;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px #ff6b6b99;
    }

    button:active { transform: scale(0.97); }

    /* Floating webcam box */
    #cam-box {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 280px;
      background: #000;
      border: 3px solid #ff6b6b;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px #ff6b6b88;
      display: none;
      flex-direction: column;
      z-index: 999;
      animation: slideIn 0.4s ease;
      cursor: grab;
      user-select: none;
    }

    #cam-box.dragging { cursor: grabbing; }

    @keyframes slideIn {
      from { transform: translateY(100px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #cam-header {
      background: #ff6b6b;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #rec-indicator {
      display: none;
      align-items: center;
      gap: 5px;
    }
    #rec-indicator.active { display: flex; }
    #rec-dot {
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      animation: blink 1s infinite;
    }

    #cam-video {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      transform: scaleX(-1); /* mirror */
    }

    #cam-label {
      background: rgba(0,0,0,0.75);
      color: #ffd93d;
      text-align: center;
      padding: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #close-cam {
      background: none;
      border: none;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      padding: 0 4px;
      margin: 0;
      box-shadow: none;
    }
    #close-cam:hover { transform: scale(1.2); box-shadow: none; }

    /* Hippo reaction box */
    #hippo-box {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 280px;
      background: #000;
      border: 3px solid #6bcb77;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 30px #6bcb7788;
      display: flex;
      flex-direction: column;
      z-index: 999;
      animation: slideIn 0.4s ease;
      cursor: grab;
      user-select: none;
    }

    #hippo-box.dragging { cursor: grabbing; }

    #hippo-header {
      background: #6bcb77;
      color: #1a1a2e;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #live-dot {
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      animation: blink 1s infinite;
      box-shadow: 0 0 6px red;
      display: inline-block;
      margin-right: 5px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.1; }
    }

    #hippo-stage {
      width: 100%;
      height: 200px;
      background: #2a4a5a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #hippo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }


    #hippo-label {
      background: rgba(0,0,0,0.75);
      color: #6bcb77;
      text-align: center;
      padding: 6px;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #close-hippo {
      background: none;
      border: none;
      color: #1a1a2e;
      font-size: 1rem;
      cursor: pointer;
      padding: 0 4px;
      margin: 0;
      box-shadow: none;
    }
    #close-hippo:hover { transform: scale(1.2); }

    @media (max-width: 600px) {
      #hippo-box, #cam-box {
        width: 44vw;
        bottom: 12px;
      }
      #hippo-box { left: 8px; }
      #cam-box   { right: 8px; }
      #hippo-stage { height: 120px; }
      #cam-video   { height: 120px; }
      #hippo-header, #cam-header { font-size: 0.65rem; padding: 4px 6px; letter-spacing: 0; }
      #hippo-label, #cam-label   { font-size: 0.65rem; padding: 4px; letter-spacing: 0; }
      #close-hippo, #close-cam   { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <h1>What's so funny huh Kate?</h1>

  <div id="joke-section">
    <p id="setup"></p>
    <p id="punchline"></p>
    <button id="joke-btn" onclick="tellJoke()">Hit me with a dad joke</button>
  </div>

  <!-- Hippo reaction box -->
  <div id="hippo-box">
    <div id="hippo-header">
      <span><span id="live-dot"></span>LIVE</span>
      <span>LIVE HIPPO REACTION</span>
      <button id="close-hippo" onclick="document.getElementById('hippo-box').style.display='none'" title="Close">✕</button>
    </div>
    <div id="hippo-stage">
      <img id="hippo" src="nbrcci12uq281.png" alt="Hippo">
    </div>
    <div id="hippo-label">🦛 LIVE HIPPO REACTION 🦛</div>
  </div>

  <!-- Floating webcam -->
  <div id="cam-box">
    <div id="cam-header">
      <div id="rec-indicator">
        <div id="rec-dot"></div>
        <span>REC</span>
      </div>
      <span>LIVE LAUGH CAM</span>
      <button id="close-cam" onclick="closeCam()" title="Close">✕</button>
    </div>
    <video id="cam-video" autoplay playsinline muted></video>
    <div id="cam-label">😂 LIVE LAUGH CAM 😂</div>
  </div>

  <script>
    const jokes = [
      { setup: "Why can't you trust an atom?", punchline: "Because they make up everything! 😂" },
      { setup: "Why did the scarecrow win an award?", punchline: "Because he was outstanding in his field! 😂" },
      { setup: "I'm reading a book about anti-gravity.", punchline: "It's impossible to put down! 😂" },
      { setup: "Why don't eggs tell jokes?", punchline: "They'd crack each other up! 😂" },
      { setup: "Did you hear about the guy who invented Lifesavers?", punchline: "He made a mint! 😂" },
      { setup: "Did you know orcas have a favorite dessert?", punchline: "Baked Alaska! 😂" },
      { setup: "Did you know whales play badminton in the ocean?", punchline: "They use shrimp as the fly ball thingy! 😂" },
    ];
    let jokeIndex = 0;
    let busy = false;
    let camStream = null;

    async function tellJoke() {
      if (busy) return;
      busy = true;

      const btn = document.getElementById('joke-btn');
      const setup = document.getElementById('setup');
      const punchline = document.getElementById('punchline');

      btn.disabled = true;
      btn.textContent = '...';
      punchline.classList.remove('visible');
      punchline.textContent = '';

      await delay(400);

      const joke = jokes[jokeIndex % jokes.length];
      setup.textContent = joke.setup;

      await delay(1200);

      punchline.textContent = joke.punchline;
      punchline.classList.add('visible');

      jokeIndex++;
      btn.textContent = jokeIndex === 1 ? "wait, is that..." : "Another one!";

      await delay(1200);

      if (jokeIndex === 1) {
        launchCam();
      }
      btn.textContent = "Another one!";
      btn.disabled = false;
      busy = false;
    }

    let mediaRecorder = null;
    let recordedChunks = [];

    async function launchCam() {
      const box = document.getElementById('cam-box');
      box.style.display = 'flex';

      try {
        camStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        const video = document.getElementById('cam-video');
        video.srcObject = camStream;

        // Start recording
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(camStream, { mimeType: getSupportedMimeType() });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.start(100);
        document.getElementById('rec-indicator').classList.add('active');
      } catch (err) {
        const video = document.getElementById('cam-video');
        video.style.display = 'none';
        const label = document.getElementById('cam-label');
        label.textContent = "😱 Camera denied!";
      }
    }

    function getSupportedMimeType() {
      const types = ['video/webm;codecs=vp9,opus', 'video/webm;codecs=vp8,opus', 'video/webm', 'video/mp4'];
      return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
    }

    function closeCam() {
      document.getElementById('rec-indicator').classList.remove('active');
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.onstop = saveRecording;
        mediaRecorder.stop();
      }
      if (camStream) {
        camStream.getTracks().forEach(t => t.stop());
        camStream = null;
      }
      document.getElementById('cam-box').style.display = 'none';
    }

    async function saveRecording() {
      if (!recordedChunks.length) return;
      const mimeType = mediaRecorder.mimeType || 'video/webm';
      const blob = new Blob(recordedChunks, { type: mimeType });
      recordedChunks = [];

      await fetch('/save-recording', { method: 'POST', headers: { 'Content-Type': mimeType }, body: blob });

    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    // Generic drag support
    function makeDraggable(box, closeId) {
      let isDragging = false, dragOffX = 0, dragOffY = 0;
      box.addEventListener('mousedown', e => {
        if (e.target.id === closeId) return;
        isDragging = true;
        box.classList.add('dragging');
        const rect = box.getBoundingClientRect();
        dragOffX = e.clientX - rect.left;
        dragOffY = e.clientY - rect.top;
        box.style.right = 'auto';
        box.style.bottom = 'auto';
        box.style.left = rect.left + 'px';
        box.style.top = rect.top + 'px';
      });
      document.addEventListener('mousemove', e => {
        if (!isDragging) return;
        box.style.left = (e.clientX - dragOffX) + 'px';
        box.style.top  = (e.clientY - dragOffY) + 'px';
      });
      document.addEventListener('mouseup', () => {
        isDragging = false;
        box.classList.remove('dragging');
      });
    }

    makeDraggable(document.getElementById('cam-box'), 'close-cam');
    makeDraggable(document.getElementById('hippo-box'), 'close-hippo');
  </script>
</body>
</html>
